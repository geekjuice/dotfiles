# general
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g repeat-time 200

# enable mouse
set -g mouse on

# vim controls
set -g @shell_mode 'vi'
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+
bind-key -r \; last-window

# prefix
unbind C-b
set -g prefix C-a

# new window
unbind c
bind c run "(tmux new-window -c #{pane_current_path} -n $(basename #{pane_current_path}))"

# pane split
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# pane rename
unbind R
bind R run "(tmux rename-window $(basename #{pane_current_path}))"

# switch to last pane
bind-key C-a last-pane

# clear pane
unbind C-]
bind C-] send-keys 'C-l'

# conf reload
unbind r
bind r source-file $HOME/.tmux.conf \; display-message "config reloaded"

# pane resize
bind-key -r J resize-pane -D 10
bind-key -r K resize-pane -U 10
bind-key -r H resize-pane -L 10
bind-key -r L resize-pane -R 10

# pane focus resize
unbind -
bind - run "($HOME/.dotfiles/bin/tmux-resize 70)"
unbind =
bind = run "($HOME/.dotfiles/bin/tmux-resize 60)"
unbind \\
bind \\ run "($HOME/.dotfiles/bin/tmux-split-left)"

# move windows
bind-key -r ( swap-window -t -1 \; select-window -t :-
bind-key -r ) swap-window -t +1 \; select-window -t :+

# tmuxline
source-file $HOME/.tmuxline.conf

# terminal
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# tpm plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'christoomey/vim-tmux-navigator'

run '~/.tmux/plugins/tpm/tpm'

# bind after tpm to ensure priority
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# plugin configurations
set -g @menus_trigger Space
set -g @extrakto_grab_area "full"
set -g @continuum-restore 'on'
set -g @fingers-key t
set -g @fingers-main-action ':copy:'
